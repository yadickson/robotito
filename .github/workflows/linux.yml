name: C/C++ CI Linux

on: [push, pull_request]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
      CLICOLOR_FORCE: 1
      TERM: xterm-256color

    steps:
      - name: checkout source code
        uses: actions/checkout@v4
      - name: update operating system
        run: sudo apt update
      - name: install dependencies
        run: sudo apt install -y build-essential autoconf autoconf-archive automake libtool pkg-config lcov libcpputest-dev libncurses-dev
      - name: autoreconf
        run: autoreconf -ivf
      - name: configure
        run: ./configure
      - name: make
        run: make
      - name: make test
        run: make test
      - name: make coverage
        run: make coverage
      - name: make check
        run: make check
      - name: make distcheck
        run: make distcheck
